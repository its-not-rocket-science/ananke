name: SemVer Enforcement

on:
  pull_request:
    branches: ["main", "master"]
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  semver:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build tooling
        run: npm run build

      - name: Extract PR Tier 1 API surface
        run: |
          node dist/tools/api-surface.js --out api-surface-pr.json
          node -e "console.log(require('./package.json').version)" > head-version.txt

      - name: Checkout main in sibling worktree
        run: |
          git fetch origin main
          git worktree add ../ananke-main origin/main

      - name: Build main tooling and extract baseline API surface
        run: |
          cd ../ananke-main
          npm install
          npm run build
          node dist/tools/api-surface.js --out api-surface-main.json
          node -e "console.log(require('./package.json').version)" > head-version.txt
          cp api-surface-main.json ../ananke/api-surface-main.json
          cp head-version.txt ../ananke/base-version.txt

      - name: Validate semantic version bump
        run: |
          node dist/tools/semver-check.js \
            --base-version "$(cat base-version.txt)" \
            --head-version "$(cat head-version.txt)" \
            --base-surface api-surface-main.json \
            --head-surface api-surface-pr.json \
            --out semver-summary.json

      - name: Comment semver report
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const marker = '<!-- ananke-semver-check -->';
            const summary = JSON.parse(fs.readFileSync('semver-summary.json', 'utf8'));
            const body = `${marker}\n## SemVer Enforcement Report\n\n` +
              `- Base version: \`${summary.baseVersion}\`\n` +
              `- PR version: \`${summary.headVersion}\`\n` +
              `- Required bump: **${summary.required}**\n` +
              `- Actual bump: **${summary.actual}**\n` +
              `- Status: **${summary.ok ? 'PASS ✅' : 'FAIL ❌'}**\n`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
