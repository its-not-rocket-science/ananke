name: Tier 1 API Diff

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

jobs:
  api-diff:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build tools
        run: npm run build

      - name: Create main worktree
        run: |
          BASE_REF="${{ github.base_ref }}"
          git fetch origin "$BASE_REF"
          git worktree add /tmp/ananke-main "origin/$BASE_REF"

      - name: Extract API surface (PR + main)
        run: |
          node dist/tools/api-surface.js --out=api-surface-pr.json
          node dist/tools/api-surface.js --root=/tmp/ananke-main --out=/tmp/ananke-main/api-surface-main.json
          cp /tmp/ananke-main/api-surface-main.json ./api-surface-main.json

      - name: Read package versions
        id: versions
        run: |
          echo -n "head_major=" >> "$GITHUB_OUTPUT"
          node -e "console.log(require('./package.json').version.split('.')[0])" >> "$GITHUB_OUTPUT"
          echo -n "base_major=" >> "$GITHUB_OUTPUT"
          node -e "console.log(require('/tmp/ananke-main/package.json').version.split('.')[0])" >> "$GITHUB_OUTPUT"

      - name: Check API addition approval comment
        id: approval
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const approved = comments.some((c) =>
              /API-ADDITION-APPROVED/i.test(c.body || "")
              && ["OWNER", "MEMBER", "COLLABORATOR"].includes(c.author_association)
            );
            core.setOutput("approved", approved ? "true" : "false");

      - name: Run API policy checks
        run: |
          node dist/tools/api-diff-check.js \
            --base=api-surface-main.json \
            --head=api-surface-pr.json \
            --allowNew=${{ steps.approval.outputs.approved }} \
            --baseVersionMajor=${{ steps.versions.outputs.base_major }} \
            --headVersionMajor=${{ steps.versions.outputs.head_major }} \
            > api-diff-report.md
          cat api-diff-report.md

      - name: Comment API diff on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const marker = '<!-- ananke-api-diff -->';
            const reportPath = 'api-diff-report.md';

            const body = fs.existsSync(reportPath)
              ? fs.readFileSync(reportPath, 'utf8')
              : [
                  '⚠️ API diff report was not generated.',
                  '',
                  'A prior step in this job likely failed before `api-diff-report.md` could be written.',
                  'See the workflow logs for the first failing step.',
                ].join('\n');

            const finalBody = `${marker}\n${body}`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: finalBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: finalBody,
              });
            }
