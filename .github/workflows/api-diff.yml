name: Tier 1 API Diff

on:
  pull_request:
    branches: ["main", "master"]
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  api-diff:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build tooling
        run: npm run build

      - name: Extract PR Tier 1 API surface
        run: node dist/tools/api-surface.js --out api-surface-pr.json

      - name: Checkout main in sibling worktree
        run: |
          git fetch origin main
          git worktree add ../ananke-main origin/main

      - name: Build main tooling and extract baseline API surface
        run: |
          cd ../ananke-main
          npm install
          npm run build
          node dist/tools/api-surface.js --out api-surface-main.json
          cp api-surface-main.json ../ananke/api-surface-main.json

      - name: Compute API diff
        run: |
          node dist/tools/api-diff-check.js \
            --base api-surface-main.json \
            --head api-surface-pr.json \
            --out api-diff-summary.json \
            --comment-out api-diff-comment.md

      - name: Enforce Tier 1 rules and comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const summary = JSON.parse(fs.readFileSync('api-diff-summary.json', 'utf8'));
            const table = fs.readFileSync('api-diff-comment.md', 'utf8');
            const marker = '<!-- ananke-api-diff -->';
            const body = `${marker}\n## Tier 1 API Diff Report\n\n${table}\n\n` +
              `Rules: kind changes block, param changes require major version bump, new exports require an \`API_EXPORT_APPROVED\` PR comment.`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

            const hasApprovalComment = comments.some((comment) =>
              typeof comment.body === 'string' && comment.body.includes('API_EXPORT_APPROVED')
            );

            if (summary.hasKindChanges) {
              core.setFailed('Tier 1 API kind changes detected. Merge blocked.');
              return;
            }

            if (summary.hasParamChanges) {
              core.setFailed('Tier 1 API parameter changes detected. semver-check.yml must validate a major bump.');
              return;
            }

            if (summary.hasNewExports && !hasApprovalComment) {
              core.setFailed('New Tier 1 exports detected. Add a PR comment containing API_EXPORT_APPROVED to unblock.');
            }
