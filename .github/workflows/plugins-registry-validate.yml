name: validate-plugin-registry

on:
  workflow_dispatch:
  push:
    paths:
      - "plugins/**"
      - "schema/plugin.schema.json"
      - "src/plugins/**"
      - "test/plugins/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx vitest run test/plugins
