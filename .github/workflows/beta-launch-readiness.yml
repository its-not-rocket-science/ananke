name: Beta Launch Readiness

on:
  workflow_dispatch:
  release:
    types: [published, prereleased]
  pull_request:
    branches: [main, master]
    paths:
      - ".github/workflows/beta-launch-readiness.yml"
      - ".github/beta-launch-readiness.json"
      - "docs/releases/v1.0.0-beta.1-readiness-checklist.md"
      - "docs/releases/v1.0.0-beta.1-announcements.md"
      - "tools/check-beta-readiness.mjs"
      - "tools/**"
      - "src/**"
      - "test/**"
      - "as/**"
      - "docs/**"
  push:
    tags:
      - "v1.0.0-beta.*"

permissions:
  contents: read

jobs:
  technical-matrix:
    name: Technical matrix (Node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node: [18.x, 20.x, 22.x]
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm install
      - run: npm run build
      - run: npm run test

  determinism-fuzzer:
    name: Determinism fuzzer (CI profile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: npm run test:determinism:ci

  performance-budget:
    name: Performance budget gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run benchmark:run
      - run: npm run benchmark:budget

  wasm-determinism:
    name: WASM backend determinism gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test:wasm
      - run: ANANKE_STRICT_DETERMINISM=1 npm run test:determinism -- --run test/determinism/fuzz-against-wasm.spec.ts --seed=1337

  api-stability:
    name: API stability gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run check-stable-api
      - run: npm run docs:api
      - name: Tier 1 API diff since latest release tag
        run: |
          set -euo pipefail
          git fetch --force --tags origin

          BASE_TAG="$(git tag --list 'v*' --sort=-version:refname | head -n 1)"
          if [ -z "$BASE_TAG" ]; then
            echo "No release tags found; using origin/main as API baseline."
            git fetch origin main
            BASE_REF="origin/main"
            BASE_DIR="/tmp/ananke-main"
            BASE_SURFACE="/tmp/ananke-main/api-surface-main.json"
          else
            echo "Using ${BASE_TAG} as API baseline."
            BASE_REF="refs/tags/${BASE_TAG}"
            BASE_DIR="/tmp/ananke-${BASE_TAG#v}"
            BASE_SURFACE="${BASE_DIR}/api-surface-${BASE_TAG#v}.json"
          fi

          rm -rf "${BASE_DIR}"
          git worktree add "${BASE_DIR}" "${BASE_REF}"

          node dist/tools/api-surface.js --out=api-surface-current.json
          node dist/tools/api-surface.js --root="${BASE_DIR}" --out="${BASE_SURFACE}"
          node dist/tools/api-diff-check.js \
            --base="${BASE_SURFACE}" \
            --head=api-surface-current.json \
            --allowNew=false \
            --baseVersionMajor=1 \
            --headVersionMajor=1

  manual-attestation-gate:
    name: Manual readiness attestation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - run: npm ci
      - run: npm run check:beta-readiness
      - name: Verify release artifacts are present
        run: |
          test -f docs/releases/v1.0.0-beta.1-readiness-checklist.md
          test -f docs/releases/v1.0.0-beta.1-announcements.md

  release-gate:
    name: release-gate
    runs-on: ubuntu-latest
    needs:
      - technical-matrix
      - determinism-fuzzer
      - performance-budget
      - wasm-determinism
      - api-stability
      - manual-attestation-gate
    steps:
      - run: |
          echo "✅ Beta launch readiness passed. Safe to announce v1.0.0-beta.1."
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "✅ Release event passed all readiness gates."
          fi
