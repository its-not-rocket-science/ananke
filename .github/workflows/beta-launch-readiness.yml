name: Beta Launch Readiness

on:
  workflow_dispatch:
  pull_request:
    branches: [main, master]
    paths:
      - ".github/workflows/beta-launch-readiness.yml"
      - ".github/beta-launch-readiness.json"
      - "docs/releases/v1.0.0-beta.1-readiness-checklist.md"
      - "tools/check-beta-readiness.mjs"
      - "tools/**"
      - "src/**"
      - "test/**"
      - "as/**"
      - "docs/**"
  push:
    tags:
      - "v1.0.0-beta.*"

jobs:
  technical-matrix:
    name: Technical matrix (Node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node: [18.x, 20.x, 22.x]
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm install
      - run: npm run build
      - run: npm run test

  determinism-fuzzer:
    name: Determinism fuzzer (10k seeds)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test:determinism:nightly

  performance-budget:
    name: Performance budget gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run benchmark:run
      - run: npm run benchmark:budget

  wasm-determinism:
    name: WASM backend determinism gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test:wasm
      - run: npm run test:determinism -- --run test/determinism/fuzz-against-wasm.spec.ts --seed=1337

  api-stability:
    name: API stability gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run check-stable-api
      - run: npm run docs:api
      - name: Tier 1 API diff since v0.1.69
        run: |
          git fetch --tags --force
          git rev-parse -q --verify "refs/tags/v0.1.69" >/dev/null
          git worktree add /tmp/ananke-v0169 "refs/tags/v0.1.69"
          node dist/tools/api-surface.js --out=api-surface-current.json
          node dist/tools/api-surface.js --root=/tmp/ananke-v0169 --out=/tmp/ananke-v0169/api-surface-v0169.json
          node dist/tools/api-diff-check.js \
            --base=/tmp/ananke-v0169/api-surface-v0169.json \
            --head=api-surface-current.json \
            --allowNew=false \
            --baseVersionMajor=1 \
            --headVersionMajor=1

  manual-attestation-gate:
    name: Manual readiness attestation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - run: node tools/check-beta-readiness.mjs --file=.github/beta-launch-readiness.json

  release-gate:
    name: release-gate
    runs-on: ubuntu-latest
    needs:
      - technical-matrix
      - determinism-fuzzer
      - performance-budget
      - wasm-determinism
      - api-stability
      - manual-attestation-gate
    steps:
      - run: echo "✅ Beta launch readiness passed. Safe to announce v1.0.0-beta.1."
