name: Determinism Nightly

on:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Run full determinism oracle
        run: npm run test:determinism:nightly -- --reporter=json --outputFile=determinism-report/results.json
      - name: Build determinism status artifact
        run: node tools/generate-determinism-status.mjs --input=determinism-report/results.json --output=determinism-report/status.json
      - name: Build report site
        run: |
          mkdir -p determinism-report
          DATE_UTC="$(date -u +%Y-%m-%d)"
          cat > determinism-report/index.html <<HTML
          <html><body><h1>Determinism Report</h1><p>Nightly run (UTC date: ${DATE_UTC})</p><h2>Machine-readable status</h2><pre id='status'></pre><h2>Raw Vitest JSON</h2><pre id='raw'></pre><script>Promise.all([fetch('./status.json').then(r=>r.text()),fetch('./results.json').then(r=>r.text())]).then(([s,t])=>{document.getElementById('status').textContent=s;document.getElementById('raw').textContent=t;})</script></body></html>
          HTML
      - name: Upload determinism status artifact
        uses: actions/upload-artifact@v4
        with:
          name: determinism-status-nightly
          path: determinism-report/status.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: determinism-report

  deploy:
    needs: fuzz
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
