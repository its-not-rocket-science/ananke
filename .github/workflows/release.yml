name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Beta launch readiness gate (v1.0.0-beta.* only)
        if: startsWith(github.ref_name, 'v1.0.0-beta.')
        run: |
          npm run build
          node tools/check-beta-readiness.mjs --file=.github/beta-launch-readiness.json

      - name: Run full release checks (CI + determinism + benchmarks)
        run: bash release/run-release-checks.sh

      - name: Build release artifacts (npm + WASM)
        run: bash release/build-release-artifacts.sh

      - name: Publish package to npm with provenance
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract release notes from CHANGELOG.md
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: bash release/extract-changelog-notes.sh

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            release/artifacts/*.tgz
            release/artifacts/wasm/**
          generate_release_notes: true
