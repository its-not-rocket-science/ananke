name: Determinism

on:
  pull_request:
  push:
    branches: [main]

jobs:
  regression:
    name: Determinism regression gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Run determinism regression test (json)
        run: npm run test:determinism -- --run test/determinism/regression.spec.ts --seed=1337 --reporter=json --outputFile=determinism-report/results.json
      - name: Build determinism status artifact
        run: node tools/generate-determinism-status.mjs --input=determinism-report/results.json --output=determinism-report/status.json
      - name: Upload determinism status artifact
        uses: actions/upload-artifact@v4
        with:
          name: determinism-status
          path: determinism-report/status.json
