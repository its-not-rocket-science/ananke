name: Determinism

on:
  pull_request:
  push:
    branches: [main]

jobs:
  regression:
    name: Determinism (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18.x, 20.x]
    env:
      DETERMINISM_SEED: "1337"
      ANANKE_STRICT_DETERMINISM: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Build WASM artifacts (required)
        run: npm run build:wasm:all
      - name: Assert required WASM artifacts exist
        shell: bash
        run: |
          node -e "const fs=require('node:fs');const required=['dist/as/units.wasm','dist/as/push.wasm','dist/as/injury.wasm','wasm/ananke-core.wasm'];const missing=required.filter((p)=>!fs.existsSync(p));if(missing.length){console.error('Missing required WASM artifacts:');for(const m of missing)console.error(`- ${m}`);process.exit(1);}console.log('All required WASM artifacts exist.');"
      - name: Run determinism regression test (json)
        run: node tools/run-determinism-tests.mjs test/determinism/fuzz-against-wasm.spec.ts test/determinism/regression.spec.ts --seed=${{ env.DETERMINISM_SEED }} --reporter=json --outputFile=determinism-report/results.json
      - name: Assert determinism suite was not skipped
        shell: bash
        run: |
          node -e "const fs=require('node:fs');const p='determinism-report/results.json';const r=JSON.parse(fs.readFileSync(p,'utf8'));const suites=Array.isArray(r.testResults)?r.testResults:[];const skipped=suites.filter((s)=>String(s?.status).toLowerCase()==='skipped');if(skipped.length){console.error('Skipped suites detected in determinism run:');for(const s of skipped){console.error(`- ${s.name ?? '<unknown suite>'}`);}process.exit(1);}const expected=['test/determinism/fuzz-against-wasm.spec.ts','test/determinism/regression.spec.ts'];const normalized=suites.map((s)=>String(s?.name??'').replace(/\\\\/g,'/'));const missing=expected.filter((name)=>!normalized.some((n)=>n.endsWith(name)));if(missing.length){console.error('Missing required determinism suites in report:');for(const m of missing){console.error(`- ${m}`);}process.exit(1);}console.log('No skipped determinism suites detected, and all required suites were executed.');"
      - name: Build determinism status artifact
        run: node tools/generate-determinism-status.mjs --input=determinism-report/results.json --output=determinism-report/status.json
      - name: Upload determinism status artifact
        uses: actions/upload-artifact@v4
        with:
          name: determinism-status-${{ matrix.os }}-node-${{ matrix.node }}
          path: determinism-report/status.json

  aggregate:
    name: Aggregate determinism status
    runs-on: ubuntu-latest
    needs: regression
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: determinism-status-*
          path: determinism-report/matrix
      - name: Compare status across environments
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const root = path.resolve('determinism-report/matrix');
          const entries = fs.readdirSync(root, { withFileTypes: true }).filter((x) => x.isDirectory());
          if (entries.length === 0) {
            console.error('No determinism status artifacts found.');
            process.exit(1);
          }

          function readStatus(dir) {
            const p = path.join(root, dir, 'status.json');
            const raw = JSON.parse(fs.readFileSync(p, 'utf8'));
            const normalizeSuiteName = (name) => {
              if (typeof name !== 'string') return null;
              const slash = name.replace(/\\/g, '/').replace(/^[A-Za-z]:/, '');
              const testIdx = slash.toLowerCase().lastIndexOf('/test/');
              if (testIdx >= 0) return slash.slice(testIdx + 1);
              const distIdx = slash.toLowerCase().lastIndexOf('/dist-test/');
              if (distIdx >= 0) return slash.slice(distIdx + 1);
              return slash;
            };
            return {
              environment: dir.replace(/^determinism-status-/, ''),
              statusPath: p,
              status: {
                overall: raw?.status?.overall ?? null,
                reason: raw?.status?.reason ?? null,
              },
              vitest: {
                success: raw?.vitest?.success ?? null,
                numTotalTests: raw?.vitest?.numTotalTests ?? null,
                numPassedTests: raw?.vitest?.numPassedTests ?? null,
                numFailedTests: raw?.vitest?.numFailedTests ?? null,
                numTotalTestSuites: raw?.vitest?.numTotalTestSuites ?? null,
                numPassedTestSuites: raw?.vitest?.numPassedTestSuites ?? null,
                numFailedTestSuites: raw?.vitest?.numFailedTestSuites ?? null,
                passRate: raw?.vitest?.passRate ?? null,
              },
              suites: Array.isArray(raw?.suites)
                ? raw.suites.map((s) => ({
                    name: normalizeSuiteName(s?.name),
                    status: s?.status ?? null,
                    assertionsTotal: s?.assertionsTotal ?? null,
                    assertionsPassed: s?.assertionsPassed ?? null,
                    assertionsFailed: s?.assertionsFailed ?? null,
                  }))
                : [],
            };
          }

          const records = entries.map((e) => readStatus(e.name)).sort((a, b) => a.environment.localeCompare(b.environment));
          const baseline = JSON.stringify({ status: records[0].status, vitest: records[0].vitest, suites: records[0].suites });
          const divergences = records.filter((r) => JSON.stringify({ status: r.status, vitest: r.vitest, suites: r.suites }) !== baseline);

          const aggregate = {
            schemaVersion: 1,
            generatedAtUtc: new Date().toISOString(),
            baselineEnvironment: records[0].environment,
            environmentsCompared: records.length,
            consistentAcrossMatrix: divergences.length === 0,
            records,
          };

          fs.mkdirSync('determinism-report', { recursive: true });
          fs.writeFileSync('determinism-report/status.json', `${JSON.stringify(aggregate, null, 2)}\n`);

          if (divergences.length > 0) {
            console.error('Determinism status diverged across environments.');
            for (const d of divergences) {
              console.error(`- ${d.environment}`);
            }
            process.exit(1);
          }

          console.log(`Determinism status is consistent across ${records.length} environments.`);
          NODE
      - name: Generate CI trust report payload from matrix status
        run: node tools/generate-ci-trust-report.mjs --output=docs/dashboard/ci-trust-report.json --determinism-status=determinism-report/status.json --wasm-pct=100 --fuzz-executions=2000
      - name: Upload aggregated determinism status
        uses: actions/upload-artifact@v4
        with:
          name: determinism-status-aggregate
          path: determinism-report/status.json
      - name: Upload CI trust report payload
        uses: actions/upload-artifact@v4
        with:
          name: ci-trust-report-determinism
          path: docs/dashboard/ci-trust-report.json
