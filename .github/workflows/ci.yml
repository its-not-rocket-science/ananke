name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ["20.x", "22.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        # Use `npm install` rather than `npm ci` so that branches adding a new
        # packages/* workspace without regenerating the lock file do not hard-fail.
        # Strict lock-file enforcement is applied in publish.yml before any release.
        run: npm install

      - name: Type check
        run: tsc --noEmit -p tsconfig.build.json

      - name: Build
        run: npm run build

      - name: Check Tier-1 imports in docs and examples
        run: npm run check-docs-tier1-imports

      - name: Typecheck TypeScript docs examples
        run: npm run check:doc-examples

      - name: Check docs for stale links and references
        run: npm run check:docs

      - name: Reference app smoke test
        run: npx vitest run test/reference-tactical-duel-smoke.test.ts

      - name: Test with coverage
        run: npm run test:coverage

      - name: Check package boundaries (strict core gate + report)
        run: npm run check-boundaries:ci

      - name: Generate CI trust report payload
        run: npm run generate-ci-trust-report

      - name: Verify coverage summary exists for trust dashboard
        run: npm run check-coverage-summary

      - name: Generate compact coverage dashboard artifact
        run: npm run generate-coverage-status

      - name: Verify CI trust report exists for trust dashboard
        run: test -f docs/dashboard/ci-trust-report.json

      - name: Check release dashboard freshness
        run: npm run check-release-dashboard

      - name: Check trust dashboard artifacts
        run: npm run check-trust-dashboard-artifacts

      - name: Enforce fully-verified trust dashboard on main
        if: github.ref_name == 'main' && matrix.node-version == '20.x'
        run: npm run check-trust-dashboard-main

      - name: Upload package boundary report
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: package-boundary-report
          path: docs/package-boundary-report.md

      - name: Upload coverage report
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/coverage-summary.json

      - name: Upload coverage status summary
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-status
          path: docs/dashboard/coverage-status.md

      - name: Upload CI trust report
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: ci-trust-report
          path: docs/dashboard/ci-trust-report.json
