name: CI

on:
  push:
    branches: ["main", "master"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"
  pull_request:
    branches: ["main", "master"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ["20.x", "22.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        # Use `npm install` rather than `npm ci` so that branches adding a new
        # packages/* workspace without regenerating the lock file do not hard-fail.
        # Strict lock-file enforcement is applied in publish.yml before any release.
        run: npm install

      - name: Type check
        run: tsc --noEmit -p tsconfig.build.json

      - name: Build
        run: npm run build

      - name: Check Tier-1 imports in docs and examples
        run: npm run check-docs-tier1-imports

      - name: Typecheck TypeScript docs examples
        run: npm run check:doc-examples

      - name: Check docs for stale links and references
        run: npm run check:docs

      - name: Reference app smoke test
        run: npx vitest run test/reference-tactical-duel-smoke.test.ts

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build WASM artifacts for determinism verification
        if: matrix.node-version == '20.x'
        run: npm run build:wasm:all

      - name: Run required WASM determinism suites
        if: matrix.node-version == '20.x'
        run: |
          mkdir -p determinism-report
          ANANKE_STRICT_DETERMINISM=1 \
          DETERMINISM_SEED=1337 \
          DETERMINISM_WORLD_STATES=2000 \
          DETERMINISM_COMMANDS_PER_STATE=500 \
          node tools/run-determinism-tests.mjs \
            test/determinism/fuzz-against-wasm.spec.ts \
            test/determinism/regression.spec.ts \
            test/determinism/scenario-corpus.spec.ts \
            --seed=1337 \
            --reporter=json \
            --outputFile=determinism-report/results.json

      - name: Assert required determinism suites were executed (no skips)
        if: matrix.node-version == '20.x'
        run: |
          node tools/verify-required-vitest-suites.mjs \
            --report=determinism-report/results.json \
            --require=fuzz-against-wasm \
            --require=regression \
            --require=scenario-corpus

      - name: Generate determinism release artifacts
        if: matrix.node-version == '20.x'
        run: |
          node tools/generate-determinism-release-artifacts.mjs \
            --input=determinism-report/results.json \
            --summary=docs/dashboard/determinism-release-status.json \
            --matrix=docs/dashboard/determinism-matrix-summary.json \
            --doc=docs/determinism-status.md \
            --fuzz-threshold=2000 \
            --seed=1337 \
            --world-states=2000 \
            --commands-per-state=500

      - name: Validate determinism release artifacts
        if: matrix.node-version == '20.x'
        run: |
          node tools/check-determinism-release-artifacts.mjs \
            --summary=docs/dashboard/determinism-release-status.json \
            --min-fuzz=2000

      - name: Check package boundaries (strict core gate + report)
        run: npm run check-boundaries:ci

      - name: Generate CI trust report payload
        run: |
          node tools/generate-ci-trust-report.mjs \
            --output=docs/dashboard/ci-trust-report.json \
            --determinism-status=docs/dashboard/determinism-release-status.json \
            --require-determinism-status=true

      - name: Verify coverage summary exists for trust dashboard
        run: npm run check-coverage-summary

      - name: Generate compact coverage dashboard artifact
        run: npm run generate-coverage-status

      - name: Verify CI trust report exists for trust dashboard
        run: test -f docs/dashboard/ci-trust-report.json

      - name: Check release dashboard freshness
        run: npm run check-release-dashboard

      - name: Check trust dashboard artifacts
        run: npm run check-trust-dashboard-artifacts

      - name: Enforce fully-verified trust dashboard on main
        if: github.ref_name == 'main' && matrix.node-version == '20.x'
        run: npm run check-trust-dashboard-main

      - name: Upload package boundary report
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: package-boundary-report
          path: docs/package-boundary-report.md

      - name: Upload coverage report
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/coverage-summary.json

      - name: Upload coverage status summary
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-status
          path: docs/dashboard/coverage-status.md

      - name: Upload CI trust report
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: ci-trust-report
          path: docs/dashboard/ci-trust-report.json
