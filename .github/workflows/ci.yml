name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ["20.x", "22.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: tsc --noEmit -p tsconfig.build.json

      - name: Build
        run: npm run build

      - name: Reference app smoke test
        run: npx vitest run test/reference-tactical-duel-smoke.test.ts

      - name: Test with coverage
        run: npm run test:coverage

      - name: Check package boundaries (warning mode)
        run: npm run check-boundaries:report

      - name: Upload package boundary report
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: package-boundary-report
          path: docs/package-boundary-report.md

      - name: Upload coverage report
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage