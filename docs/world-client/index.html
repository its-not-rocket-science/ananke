<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ananke — Persistent World</title>
<style>
  :root{--bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3245;--text:#e0e4f0;
    --muted:#7a81a0;--accent:#6366f1;--warn:#f59e0b;--cyan:#22d3ee;--pass:#22c55e;--fail:#ef4444;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:ui-monospace,"Cascadia Code",Menlo,monospace;font-size:13px;display:flex;flex-direction:column;height:100vh;overflow:hidden}
  header{padding:.5rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1rem;flex-shrink:0}
  header h1{font-size:1.05rem}
  .sub{color:var(--muted);font-size:.78rem}
  .conn{display:flex;align-items:center;gap:.4rem;margin-left:auto;font-size:.75rem}
  .conn-dot{width:8px;height:8px;border-radius:50%;background:var(--fail)}
  .conn-dot.live{background:var(--pass)}
  .day-badge{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:.2rem .6rem;color:var(--warn);font-weight:700;font-size:.82rem}
  .body{display:flex;flex:1;overflow:hidden}
  /* Map */
  .map-col{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--border);min-width:0}
  .map-wrap{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:.5rem}
  svg#map{width:100%;height:100%;max-width:820px;max-height:580px}
  .controls{padding:.5rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.5rem;flex-shrink:0;flex-wrap:wrap}
  .btn{background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;padding:.2rem .6rem;transition:border-color .1s}
  .btn:hover{border-color:var(--accent)}
  .btn.danger{border-color:#7f1d1d;color:#fca5a5}
  .btn.war{border-color:#7f1d1d;color:#fca5a5}
  .btn.peace{border-color:#14532d;color:#86efac}
  .ctrl-label{color:var(--muted);font-size:.72rem}
  select{background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:inherit;font-size:11px;padding:.2rem .4rem;outline:none}
  /* Right panel */
  .side{width:260px;overflow-y:auto;flex-shrink:0;padding:.65rem}
  .sec-head{color:var(--warn);font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin:.65rem 0 .3rem}
  .sec-head:first-child{margin-top:0}
  .polity-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.5rem .65rem;margin-bottom:.35rem;border-left-width:3px}
  .pc-row{display:flex;align-items:center;gap:.35rem;margin-bottom:.3rem}
  .pc-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .pc-name{font-weight:700;font-size:.78rem}
  .pc-era{color:var(--cyan);font-size:.68rem;margin-left:auto}
  .pc-grid{display:grid;grid-template-columns:1fr 1fr;gap:.18rem .6rem;font-size:.7rem}
  .pk{color:var(--muted)}.pv{font-weight:600}
  .war-tag{background:#450a0a;color:#fca5a5;border-radius:3px;font-size:.62rem;font-weight:700;padding:.1rem .25rem}
  .pc-locs{color:var(--muted);font-size:.67rem;margin-top:.25rem;border-top:1px solid var(--border);padding-top:.25rem}
  /* Events */
  .events{max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:4px}
  .ev{padding:.22rem .5rem;border-bottom:1px solid var(--border);font-size:.7rem;display:flex;gap:.5rem}
  .ev:last-child{border-bottom:none}
  .ev-day{color:var(--muted);flex-shrink:0;min-width:42px}
  .ev-war{color:#fca5a5}.ev-peace{color:#86efac}.ev-tech{color:var(--cyan)}.ev-trade{color:var(--muted)}.ev-info{color:var(--text)}
  /* Legend */
  .legend{display:flex;gap:.5rem;padding:.4rem .75rem;border-top:1px solid var(--border);font-size:.68rem;flex-shrink:0;flex-wrap:wrap}
  .leg{display:flex;align-items:center;gap:.3rem}
  .leg-dot{width:8px;height:8px;border-radius:50%}
</style>
</head>
<body>
<header>
  <h1>Ananke — Persistent World</h1>
  <span class="sub">Live simulation · polling localhost:3000</span>
  <span class="day-badge" id="day-badge">Day —</span>
  <div class="conn"><div class="conn-dot" id="conn-dot"></div><span id="conn-label">Connecting…</span></div>
</header>

<div class="body">
  <div class="map-col">
    <div class="controls">
      <span class="ctrl-label">Diplomacy:</span>
      <select id="pol-a"></select>
      <select id="pol-b"></select>
      <button class="btn war"   onclick="sendWar()">⚔ Declare War</button>
      <button class="btn peace" onclick="sendPeace()">🕊 Make Peace</button>
      <span style="flex:1"></span>
      <button class="btn" onclick="sendSave()">Save Checkpoint</button>
      <button class="btn danger" onclick="sendReset()">Reset World</button>
    </div>
    <div class="map-wrap">
      <svg id="map" viewBox="0 0 800 620" xmlns="http://www.w3.org/2000/svg">
        <rect width="800" height="620" fill="#0d1117"/>
        <radialGradient id="rg1" cx="30%" cy="20%" r="45%"><stop offset="0%" stop-color="#1a2435"/><stop offset="100%" stop-color="#0d1117"/></radialGradient>
        <radialGradient id="rg2" cx="70%" cy="75%" r="45%"><stop offset="0%" stop-color="#1a2520"/><stop offset="100%" stop-color="#0d1117"/></radialGradient>
        <rect width="800" height="620" fill="url(#rg1)"/>
        <rect width="800" height="620" fill="url(#rg2)" opacity="0.6"/>
        <g id="territories"></g>
        <g id="routes"></g>
        <g id="war-lines"></g>
        <g id="nodes"></g>
        <g id="labels"></g>
      </svg>
    </div>
    <div class="legend" id="legend"></div>
  </div>

  <div class="side">
    <div class="sec-head">Polity Status</div>
    <div id="polity-cards"></div>
    <div class="sec-head">Event Log</div>
    <div class="events" id="events-log"><div style="padding:.4rem .5rem;color:var(--muted);font-size:.72rem">Waiting for server…</div></div>
  </div>
</div>

<script>
const SERVER = 'http://localhost:3000';
const ERA_NAMES = ["Prehistoric","Ancient","Medieval","EarlyModern","Industrial","Modern","NearFuture","FarFuture","DeepSpace"];
const POLITY_COLORS = {
  iron_clans:      '#ef4444',
  merchant_league: '#f59e0b',
  sun_theocracy:   '#a855f7',
  plains_nomads:   '#22c55e',
  ancient_library: '#22d3ee',
};
const POLITY_PAIRS = [
  {a:'iron_clans',b:'merchant_league'},
  {a:'merchant_league',b:'sun_theocracy'},
  {a:'merchant_league',b:'plains_nomads'},
  {a:'merchant_league',b:'ancient_library'},
  {a:'sun_theocracy',b:'ancient_library'},
  {a:'plains_nomads',b:'ancient_library'},
];
const LOCS = [
  {id:'ironholt',      name:'Ironholt',       polityId:'iron_clans',      x:115, y: 95},
  {id:'forge_peak',    name:'Forge Peak',      polityId:'iron_clans',      x:185, y:125},
  {id:'ashfield',      name:'Ashfield',        polityId:'iron_clans',      x:140, y:185},
  {id:'crossroads',    name:'Crossroads',      polityId:'merchant_league', x:380, y:285},
  {id:'harbor_town',   name:'Harbor Town',     polityId:'merchant_league', x:315, y:330},
  {id:'silver_gate',   name:'Silver Gate',     polityId:'merchant_league', x:445, y:305},
  {id:'dawn_citadel',  name:'Dawn Citadel',    polityId:'sun_theocracy',   x:625, y:135},
  {id:'sun_temple',    name:'Sun Temple',      polityId:'sun_theocracy',   x:675, y:205},
  {id:'radiant_port',  name:'Radiant Port',    polityId:'sun_theocracy',   x:645, y:275},
  {id:'dustwatch',     name:'Dustwatch',       polityId:'plains_nomads',   x:165, y:375},
  {id:'grasshaven',    name:'Grasshaven',      polityId:'plains_nomads',   x:225, y:425},
  {id:'windsteppe',    name:'Windsteppe',      polityId:'plains_nomads',   x:170, y:480},
  {id:'great_archive', name:'Great Archive',   polityId:'ancient_library', x:415, y:510},
  {id:'scholars_rest', name:"Scholar's Rest",  polityId:'ancient_library', x:475, y:485},
  {id:'ember_keep',    name:'Ember Keep',      polityId:'ancient_library', x:385, y:565},
];
const locMap = new Map(LOCS.map(l => [l.id, l]));

// Populate legend
document.getElementById('legend').innerHTML =
  Object.entries(POLITY_COLORS).map(([id, color]) => {
    const name = id.split('_').map(w=>w[0].toUpperCase()+w.slice(1)).join(' ');
    return '<div class="leg"><div class="leg-dot" style="background:'+color+'"></div>'+name+'</div>';
  }).join('') +
  '<div class="leg"><div style="width:18px;height:2px;background:#22d3ee;opacity:.5"></div>Trade</div>' +
  '<div class="leg"><div style="width:18px;height:2px;background:#ef4444;border-top:1px dashed #ef4444"></div>War</div>';

// Populate polity selects
function populateSelects(polities) {
  ['pol-a','pol-b'].forEach((sel, i) => {
    const el = document.getElementById(sel);
    const cur = el.value;
    el.innerHTML = polities.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    if (cur) el.value = cur;
    else if (i === 1 && polities.length > 1) el.value = polities[1].id;
  });
}

// SVG helpers
function cross(O,A,B){return(A.x-O.x)*(B.y-O.y)-(A.y-O.y)*(B.x-O.x)}
function convexHull(pts){
  if(pts.length<=2)return pts;
  const s=[...pts].sort((a,b)=>a.x!==b.x?a.x-b.x:a.y-b.y);
  const lo=[],hi=[];
  for(const p of s){while(lo.length>=2&&cross(lo.at(-2),lo.at(-1),p)<=0)lo.pop();lo.push(p)}
  for(const p of[...s].reverse()){while(hi.length>=2&&cross(hi.at(-2),hi.at(-1),p)<=0)hi.pop();hi.push(p)}
  return[...lo.slice(0,-1),...hi.slice(0,-1)];
}
function expandHull(hull,cx,cy,pad){
  return hull.map(p=>{const dx=p.x-cx,dy=p.y-cy,d=Math.sqrt(dx*dx+dy*dy)||1;return{x:p.x+dx/d*pad,y:p.y+dy/d*pad}});
}
function svgEl(tag,attrs,inner){
  const el=document.createElementNS("http://www.w3.org/2000/svg",tag);
  for(const[k,v]of Object.entries(attrs))el.setAttribute(k,v);
  if(inner!==undefined)el.innerHTML=inner;
  return el;
}

function renderMap(state) {
  const ownership = new Map();
  for (const p of state.polities) for (const lid of p.locationIds) ownership.set(lid, p.id);
  const wars = new Set(state.wars);
  ['territories','routes','war-lines','nodes','labels'].forEach(id=>{document.getElementById(id).innerHTML=''});
  const T=document.getElementById('territories'), R=document.getElementById('routes'),
        W=document.getElementById('war-lines'), N=document.getElementById('nodes'),
        L=document.getElementById('labels');

  for (const ps of state.polities) {
    if (!ps.locationIds.length) continue;
    const color = POLITY_COLORS[ps.id] ?? '#666';
    const pts = ps.locationIds.map(lid=>locMap.get(lid)).filter(Boolean);
    if (!pts.length) continue;
    const cx=pts.reduce((s,p)=>s+p.x,0)/pts.length, cy=pts.reduce((s,p)=>s+p.y,0)/pts.length;
    if (pts.length < 3) {
      const p=pts[0];
      T.appendChild(svgEl('circle',{cx:p.x,cy:p.y,r:38,fill:color+'1a',stroke:color,'stroke-width':'1','stroke-dasharray':'3,3'}));
    } else {
      const hull=convexHull(pts);
      const exp=expandHull(hull,cx,cy,28);
      T.appendChild(svgEl('polygon',{points:exp.map(p=>p.x+','+p.y).join(' '),fill:color+'16',stroke:color,'stroke-width':'1.5','stroke-dasharray':'4,3'}));
    }
    L.appendChild(svgEl('text',{x:cx,y:cy-4,'text-anchor':'middle',fill:color,'font-size':'10','font-weight':'700','font-family':'ui-monospace,monospace',opacity:'0.8'},ps.name));
    L.appendChild(svgEl('text',{x:cx,y:cy+9,'text-anchor':'middle',fill:color,'font-size':'8.5','font-family':'ui-monospace,monospace',opacity:'0.55'},ERA_NAMES[ps.techEra]??''));
  }

  for (const pair of POLITY_PAIRS) {
    const k1=pair.a+':'+pair.b, k2=pair.b+':'+pair.a;
    const atWar=wars.has(k1)||wars.has(k2);
    const psA=state.polities.find(p=>p.id===pair.a), psB=state.polities.find(p=>p.id===pair.b);
    if(!psA||!psB)continue;
    const capA=locMap.get(psA.locationIds[0]), capB=locMap.get(psB.locationIds[0]);
    if(!capA||!capB)continue;
    if(atWar){
      W.appendChild(svgEl('line',{x1:capA.x,y1:capA.y,x2:capB.x,y2:capB.y,stroke:'#ef4444','stroke-width':'2','stroke-dasharray':'6,4',opacity:'0.7'}));
    } else {
      R.appendChild(svgEl('line',{x1:capA.x,y1:capA.y,x2:capB.x,y2:capB.y,stroke:'#22d3ee','stroke-width':'1',opacity:'0.22'}));
    }
  }

  for (const loc of LOCS) {
    const ownerId=ownership.get(loc.id);
    const color=ownerId?POLITY_COLORS[ownerId]??'#666':'#374151';
    const isCapital=state.polities.find(p=>p.id===ownerId)?.locationIds[0]===loc.id;
    const r=isCapital?9:6;
    N.appendChild(svgEl('circle',{cx:loc.x,cy:loc.y,r:r+3,fill:color+'1a'}));
    N.appendChild(svgEl('circle',{cx:loc.x,cy:loc.y,r,fill:ownerId?color:'#1f2937',stroke:color,'stroke-width':isCapital?'2':'1'}));
    if(isCapital)N.appendChild(svgEl('circle',{cx:loc.x,cy:loc.y,r:'3',fill:'#fff',opacity:'0.8'}));
    L.appendChild(svgEl('text',{x:loc.x,y:loc.y+r+10,'text-anchor':'middle',fill:'#94a3b8','font-size':'8','font-family':'ui-monospace,monospace'},loc.name));
  }
}

function renderStats(state) {
  const wars = new Set(state.wars);
  document.getElementById('polity-cards').innerHTML = state.polities.map(ps => {
    const color=POLITY_COLORS[ps.id]??'#666';
    const atWar=[...wars].some(w=>w.includes(ps.id));
    const locNames=ps.locationIds.map(lid=>locMap.get(lid)?.name??lid).join(', ');
    return '<div class="polity-card" style="border-left-color:'+color+'">'+
      '<div class="pc-row"><div class="pc-dot" style="background:'+color+'"></div>'+
      '<span class="pc-name">'+ps.name+(atWar?' <span class="war-tag">⚔ WAR</span>':'')+'</span>'+
      '<span class="pc-era">'+ps.techEraName+'</span></div>'+
      '<div class="pc-grid">'+
        '<span class="pk">Treasury</span><span class="pv">'+ps.treasury.toLocaleString()+' cu</span>'+
        '<span class="pk">Military</span><span class="pv">'+Math.round(ps.militaryStrength*100)+'%</span>'+
        '<span class="pk">Morale</span><span class="pv">'+Math.round(ps.morale*100)+'%</span>'+
        '<span class="pk">Stability</span><span class="pv">'+Math.round(ps.stability*100)+'%</span>'+
      '</div>'+
      '<div class="pc-locs">'+locNames+'</div></div>';
  }).join('');
}

// Event log — accumulates across polls
let knownEventDay = -1;
function updateEvents(newEvents) {
  const el = document.getElementById('events-log');
  if (!newEvents.length) return;
  const frag = newEvents.map(e =>
    '<div class="ev"><span class="ev-day">Day '+e.day+'</span>'+
    '<span class="ev-'+e.type+'">'+e.text+'</span></div>'
  ).join('');
  if (el.innerHTML.includes('Waiting')) el.innerHTML = '';
  el.innerHTML += frag;
  el.scrollTop = el.scrollHeight;
  if (newEvents.length) knownEventDay = Math.max(knownEventDay, newEvents.at(-1).day);
}

// Poll loop
let connected = false;
async function poll() {
  try {
    const [stateRes, evRes] = await Promise.all([
      fetch(SERVER + '/state'),
      fetch(SERVER + '/events?since=' + knownEventDay),
    ]);
    if (!stateRes.ok || !evRes.ok) throw new Error('bad response');
    const state  = await stateRes.json();
    const evData = await evRes.json();

    if (!connected) {
      connected = true;
      document.getElementById('conn-dot').classList.add('live');
      document.getElementById('conn-label').textContent = 'Live';
      populateSelects(state.polities);
    }
    document.getElementById('day-badge').textContent = 'Day ' + state.day;
    renderMap(state);
    renderStats(state);
    updateEvents(evData.events ?? []);
  } catch {
    if (connected) {
      connected = false;
      document.getElementById('conn-dot').classList.remove('live');
      document.getElementById('conn-label').textContent = 'Disconnected';
    }
  }
}

// Diplomacy controls
async function sendWar() {
  const a=document.getElementById('pol-a').value, b=document.getElementById('pol-b').value;
  if(a===b){alert('Select two different polities');return}
  await fetch(SERVER+'/war',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({a,b})});
  poll();
}
async function sendPeace() {
  const a=document.getElementById('pol-a').value, b=document.getElementById('pol-b').value;
  await fetch(SERVER+'/peace',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({a,b})});
  poll();
}
async function sendSave() {
  await fetch(SERVER+'/save',{method:'POST'});
  alert('Checkpoint saved.');
}
async function sendReset() {
  if(!confirm('Reset world? This clears the checkpoint.'))return;
  knownEventDay=-1;
  document.getElementById('events-log').innerHTML='<div style="padding:.4rem .5rem;color:var(--muted);font-size:.72rem">Resetting…</div>';
  await fetch(SERVER+'/reset',{method:'POST'});
  poll();
}

poll();
setInterval(poll, 1500);
</script>
</body>
</html>
